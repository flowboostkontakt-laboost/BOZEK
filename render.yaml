# Blueprint wdrożenia (Render.com) — baza + API + PWA jednym plikiem.
# Na Render: New → Blueprint → wskaż repo BOZEK → Apply.
# Adresy między usługami wpinają się automatycznie (fromService) — nic nie trzeba ręcznie wpisywać.
databases:
  - name: bozek-db
    plan: free
    postgresMajorVersion: "16"

services:
  # ─── Backend API (NestJS, Docker) ───────────────────────────────
  - type: web
    name: bozek-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bozek-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PORT
        value: "3000"
      - key: AUTO_LOGOUT_HOUR
        value: "18"
      - key: TZ
        value: Europe/Warsaw
      - key: AI_PROVIDER
        value: local
      # Adres frontu (CORS) — pobierany automatycznie z usługi PWA
      - key: WEB_ORIGIN
        fromService:
          type: web
          name: bozek-web
          property: host
      - key: PRESTASHOP_API_URL
        sync: false # uzupełnij w panelu Render (lub zostaw — sync po prostu nie zadziała)
      - key: PRESTASHOP_API_KEY
        sync: false

  # ─── Frontend PWA (statyczny) ───────────────────────────────────
  - type: web
    name: bozek-web
    runtime: static
    buildCommand: npm install && npm run build -w @sep/shared && npm run build -w @sep/web
    staticPublishPath: ./apps/web/dist
    envVars:
      # Adres backendu — pobierany automatycznie z usługi API
      - key: VITE_API_URL
        fromService:
          type: web
          name: bozek-api
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
